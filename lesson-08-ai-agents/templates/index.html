<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Agent</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 760px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }

        h1 {
            margin-bottom: 8px;
        }

        .subtitle {
            color: #555;
            margin-bottom: 24px;
        }

        form {
            margin-bottom: 24px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            margin-top: 12px;
            padding: 10px 16px;
            font-size: 16px;
            cursor: pointer;
        }

        .box {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            background: #fafafa;
            white-space: pre-wrap;
        }

        .error {
            border: 1px solid #e0a0a0;
            background: #fff5f5;
            color: #8a1f1f;
        }

        .question {
            color: #444;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <h1>Stock Agent</h1>
    <p class="subtitle">
        Ask about stock prices, market data, one-year performance, recommendations, or news.
    </p>

    <form method="post">
        <label for="question">Question</label><br>
        <input
            type="text"
            id="question"
            name="question"
            value="{{ question }}"
            placeholder="Example: What is the current price of MSFT?"
        >
        <button type="submit">Ask</button>
    </form>

    {% if error %}
        <div class="box error">
            {{ error }}
        </div>
    {% endif %}

    {% if answer %}
        <div class="box">
            <div class="question">
                <strong>You asked:</strong> {{ question }}
            </div>
            <strong>Answer:</strong>
            <br>
            {{ answer }}
        </div>
    {% endif %}
</body>
</html>
